name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dependency-set:
          - name: "modern"
            constraints: "constraints.txt"
          - name: "legacy" 
            constraints: "constraints-legacy.txt"
    name: "Test (${{ matrix.dependency-set.name }})"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.dependency-set.name }}-${{ hashFiles('**/requirements.txt', '**/constraints*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.dependency-set.name }}-
            ${{ runner.os }}-pip-

      - name: Create legacy constraints (if needed)
        if: matrix.dependency-set.name == 'legacy'
        run: |
          cat > constraints-legacy.txt << 'EOF'
          # Legacy dependency constraints for compatibility testing
          faiss-cpu==1.7.4
          numpy>=1.21.0,<2.0.0
          pytest>=7.4.0
          ruff>=0.1.0
          prometheus-client>=0.17.0
          EOF

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r backend/requirements.txt -c ${{ matrix.dependency-set.constraints }}

      - name: Lint
        run: ruff check .

      - name: Run fast tests (exclude slow)
        run: pytest -q -m "not slow" backend --junitxml=report-fast-${{ matrix.dependency-set.name }}.xml

      - name: Upload JUnit report (fast)
        uses: actions/upload-artifact@v4
        with:
          name: junit-fast-${{ matrix.dependency-set.name }}
          path: report-fast-${{ matrix.dependency-set.name }}.xml

  nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r backend/requirements.txt -c constraints.txt

      - name: Lint
        run: ruff check .

      - name: Run full test suite (including slow)
        run: pytest -q backend --junitxml=report-full.xml

      - name: Upload JUnit report (full)
        uses: actions/upload-artifact@v4
        with:
          name: junit-full
          path: report-full.xml


