name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r backend/requirements.txt
          pip install ruff pytest

      - name: Lint
        run: ruff check .

      - name: Run fast tests (exclude slow)
        run: pytest -q -m "not slow" backend --junitxml=report-fast.xml

      - name: Upload JUnit report (fast)
        uses: actions/upload-artifact@v4
        with:
          name: junit-fast
          path: report-fast.xml

  nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r backend/requirements.txt
          pip install ruff pytest

      - name: Lint
        run: ruff check .

      - name: Run full test suite (including slow)
        run: pytest -q backend --junitxml=report-full.xml

      - name: Upload JUnit report (full)
        uses: actions/upload-artifact@v4
        with:
          name: junit-full
          path: report-full.xml


